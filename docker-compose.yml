services:
  db:
    image: postgres:16-alpine
    container_name: tarea1-postgres
    environment:
      POSTGRES_DB: tarea1_db
      POSTGRES_USER: tarea1_user
      POSTGRES_PASSWORD: tarea1_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
